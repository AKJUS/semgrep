rules:
  - id: file-excluded
    paths:
      exclude:
        - excluded.*
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: file-included
    paths:
      include:
        - included.*
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: directory-excluded
    paths:
      exclude:
        - excluded/
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: directory-included
    paths:
      include:
        - included/
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: paths-excluded
    paths:
      exclude:
        - "**/included/excluded.*"
        - "**/excluded/excluded.*"
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: paths-included
    paths:
      include:
        - "**/included/included.*"
        - "**/excluded/included.*"
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: ambiguous-paths-excluded
    # Test glob patterns that are unanchored in the legacy
    # implementation and anchored in the standard Gitignore-compliant
    # implementation.
    paths:
      exclude:
        - "excluded/excluded.*"
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: ambiguous-paths-included
    # Test glob patterns that are unanchored in the legacy
    # implementation and anchored in the standard Gitignore-compliant
    # implementation.
    paths:
      include:
        - "included/included.*"
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: file-excluded-directory-included
    paths:
      exclude:
        - excluded.*
      include:
        - included/
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
  - id: directory-excluded-file-included
    paths:
      exclude:
        - excluded/
      include:
        - included.*
    patterns:
      - pattern: "$X == $X"
    message: "possibly useless comparison but in eq function"
    languages: [javascript]
    severity: ERROR
