# AUTOGENERATED FROM test-e2e-semgrep-ci.jsonnet DO NOT MODIFY
jobs:
  get-inputs:
    name: Get Inputs
    outputs:
      docker_tag: ${{ steps.get-inputs.outputs.docker_tag }}
    runs-on: ubuntu-22.04
    steps:
      - env:
          DOCKER_TAG: develop
          INPUT_DOCKER_TAG: ${{ inputs.docker_tag }}
        id: get-inputs
        name: Set variables
        run: echo "docker_tag=${{ env.INPUT_DOCKER_TAG || env.DOCKER_TAG }}" >> $GITHUB_OUTPUT
      - env:
          DOCKER_TAG: ${{ steps.get-inputs.outputs.docker_tag }}
        name: Debug
        run: echo "$DOCKER_TAG"
  notify-failure:
    env:
      DOCKER_TAG: ${{ needs.get-inputs.outputs.docker_tag }}
      PR_NUMBER: ${{ needs.semgrep-ci-on-pr.outputs.pr-number }}
    if: failure()
    needs:
      - semgrep-ci
      - semgrep-ci-on-pr
      - semgrep-ci-fail-open
      - semgrep-ci-fail-open-blocking-findings
      - wait-for-checks
      - get-inputs
    runs-on: ubuntu-22.04
    steps:
      - env:
          NOTIFICATIONS_URL: ${{ secrets.NOTIFICATIONS_URL}}
        run: |
          curl --request POST \
           --url  "$NOTIFICATIONS_URL"  \
           --header 'content-type: application/json' \
           --data "{
             \"text\": \"The End to end semgrep ci workflow failed with docker tag \\\"$DOCKER_TAG\\\". The PR in `semgrep/e2e` that had the failure was \\\"$PR_NUMBER\\\". See https://github.com/semgrep/semgrep/actions/workflows/test-e2e-semgrep-ci.yml for more info\"
           }"
  semgrep-ci:
    container:
      image: semgrep/semgrep-nightly:${{ needs.get-inputs.outputs.docker_tag }}
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_E2E_APP_TOKEN }}
    needs: get-inputs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - run: semgrep ci
  semgrep-ci-fail-open:
    container:
      image: semgrep/semgrep-nightly:${{ needs.get-inputs.outputs.docker_tag }}
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_E2E_APP_TOKEN }}
      SEMGREP_APP_URL: https://staging.semgrep.dev
      SEMGREP_USER_AGENT_APPEND: semgrep-ci-e2e
    needs: get-inputs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Remove Git Exe
        run: |
          which git
          rm /usr/bin/git
      - run: semgrep ci --suppress-errors
  semgrep-ci-fail-open-blocking-findings:
    container:
      image: semgrep/semgrep-nightly:${{ needs.get-inputs.outputs.docker_tag }}
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_E2E_APP_TOKEN }}
      SEMGREP_USER_AGENT_APPEND: semgrep-ci-e2e
    needs: get-inputs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - id: create-code
        name: Create code under test
        run: |
          cat > ./test.py <<- EOF
          import click
          click.echo(click.style("foo"))
          EOF
      - id: run-ci
        name: Run CI
        run: |
          if semgrep ci --suppress-errors; then
             exit 2
          else
             exit 0
          fi
  semgrep-ci-on-pr:
    needs: get-inputs
    outputs:
      pr-number: ${{ steps.cpr.outputs.pull-request-number }}
    runs-on: ubuntu-22.04
    steps:
      - id: token
        name: Get token for semgrep-ci GitHub App
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ secrets.SEMGREP_CI_CLIENT_ID }}
          owner: semgrep
          private-key: ${{ secrets.SEMGREP_CI_APP_KEY }}
          repositories: e2e
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.repository.default_branch }}
          repository: semgrep/e2e
          token: ${{ steps.token.outputs.token }}
      - env:
          DOCKER_TAG: ${{ needs.get-inputs.outputs.docker_tag }}
        name: Bump version
        run: scripts/change-version.sh "$DOCKER_TAG"
      - id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          base: develop
          body: Fake PR
          branch: e2e-test-pr-${{ github.run_id }}
          commit-message: 'chore: Bump version to ${{ needs.get-inputs.outputs.docker_tag }}'
          sign-commits: true
          title: 'chore: fake PR for ${{ needs.get-inputs.outputs.docker_tag }}'
          token: ${{ steps.token.outputs.token }}
  wait-for-checks:
    needs: semgrep-ci-on-pr
    runs-on: ubuntu-22.04
    steps:
      - id: token
        name: Get token for semgrep-ci GitHub App
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ secrets.SEMGREP_CI_CLIENT_ID }}
          owner: semgrep
          private-key: ${{ secrets.SEMGREP_CI_APP_KEY }}
          repositories: e2e
      - env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        name: Wait for checks to register
        run: |
          LEN_CHECKS=$(gh pr -R semgrep/e2e view ${{ needs.semgrep-ci-on-pr.outputs.pr-number }} --json statusCheckRollup --jq '.statusCheckRollup | length');
          while [ ${LEN_CHECKS} = "0" ]; do
            echo "No checks available yet"
            sleep 30
            LEN_CHECKS=$(gh pr -R semgrep/e2e view ${{ needs.semgrep-ci-on-pr.outputs.pr-number }} --json statusCheckRollup --jq '.statusCheckRollup | length');
          done
          echo "checks are valid"
          echo ${LEN_CHECKS}
          gh pr -R semgrep/e2e view ${{ needs.semgrep-ci-on-pr.outputs.pr-number }} --json statusCheckRollup
      - env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        name: Wait for checks to complete
        run: gh pr -R semgrep/e2e checks ${{ needs.semgrep-ci-on-pr.outputs.pr-number }} --interval 30 --watch
name: test-e2e-semgrep-ci
on:
  schedule:
    - cron: 43 20 * * *
  workflow_dispatch:
    inputs:
      docker_tag:
        default: develop
        description: 'Docker Tag to Run. Default: develop (must be in the `semgrep/semgrep-nightly` namespace)'
        required: false
