# AUTOGENERATED FROM lint.jsonnet DO NOT MODIFY
jobs:
  github-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.24"
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
      - run: |
          cd .github/workflows
          actionlint -shellcheck=''
  jsonnet-gha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check GitHub workflow files are up to date
        run: |
          sudo apt-get update
          sudo apt-get install jsonnet
          cd .github/workflows
          make clean
          make
          git diff --exit-code
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git safedir properly
        run: git config --global --add safe.directory $(pwd)
      - name: Make checkout speedy
        run: git config --global fetch.parallel 50
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: true
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          python-version: "3.11"
          version: 0.10.9
      - uses: semgrep/setup-ocaml@a739c5405d73c42ef15a9dc995efc0f87396cc36
        with:
          cache-prefix: v5
          ocaml-compiler: ocaml-variants.5.3.0+options,ocaml-option-flambda
          opam-pin: false
          save-opam-post-run: true
      - run: opam install -y ocamlformat.0.29.0
      - name: Cache pre-commit hook envs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          key: pre-commit-v1|${{ hashFiles('.pre-commit-config.yaml') }}
          path: ~/.cache/pre-commit
      - name: Install pre-commit
        run: uv tool install pre-commit --with pre-commit-uv
      - env:
          SKIP: check-opam-conflicts
        name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --all-files
name: lint
on:
  pull_request:
    branches-ignore:
      - '**/graphite-base/**'
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - develop
      - release-*
  workflow_dispatch: null
