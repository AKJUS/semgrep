# AUTOGENERATED FROM build-test-manylinux-x86.jsonnet DO NOT MODIFY
jobs:
  build-wheels:
    container: quay.io/pypa/manylinux_2_28_x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Configure git safedir properly
        run: git config --global --add safe.directory $(pwd)
      - name: Make checkout speedy
        run: git config --global fetch.parallel 50
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: |
          # history:
          # we used to `yum install python3.9`
          # but now that we are on python 3.10, there is no python3.10 in `yum`
          # so we need to download and install it ourselves

          yum install -y wget zip python3-pip
          wget https://www.python.org/ftp/python/3.10.5/Python-3.10.5.tgz
          tar xzf Python-3.10.5.tgz
          cd Python-3.10.5
          ./configure --with-system-ffi --with-computed-gotos --enable-loadable-sqlite-extensions

          make -j ${nproc}
          make altinstall
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-core-x86-artifact
      - run: |
          tar xf artifacts.tgz
          cp artifacts/semgrep-core cli/src/semgrep/bin
          ./scripts/build-wheels.sh
      - uses: actions/upload-artifact@v4
        with:
          name: manylinux-x86-wheel
          path: cli/dist.zip
  test-wheels:
    container: quay.io/pypa/manylinux_2_28_x86_64
    needs:
      - build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: manylinux-x86-wheel
      - run: unzip dist.zip
      - name: install package
        run: /opt/python/cp310-cp310/bin/pip install dist/*.whl
      - name: test package
        run: |
          export PATH=/opt/python/cp310-cp310/bin:$PATH
          semgrep --version
      - name: e2e semgrep-core test
        run: |
          export PATH=/opt/python/cp310-cp310/bin:$PATH
          echo '1 == 1' | semgrep -l python -e '$X == $X' -
  test-wheels-venv:
    container: quay.io/pypa/manylinux_2_28_x86_64
    needs:
      - build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: manylinux-x86-wheel
      - run: unzip dist.zip
      - name: create venv
        run: /opt/python/cp310-cp310/bin/python3 -m venv env
      - name: install package
        run: env/bin/pip install dist/*.whl
      - name: test package
        run: |
          env/bin/semgrep --version
      - name: e2e semgrep-core test
        run: |
          echo '1 == 1' | env/bin/semgrep -l python -e '$X == $X' -
  test-wheels-wsl:
    needs:
      - build-wheels
    runs-on: windows-2025
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/download-artifact@v4
        with:
          name: manylinux-x86-wheel
      - run: unzip dist.zip
      - uses: Vampire/setup-wsl@v6
        with:
          additional-packages: |
            python3
            python3-venv
            python3-pip
          distribution: Ubuntu-22.04
          update: true
      - name: install package
        run: python3 -m pip install dist/*.whl
        shell: wsl-bash {0}
      - name: test package
        run: |
          semgrep --version
        shell: wsl-bash {0}
      - name: e2e semgrep-core test
        run: |
          echo '1 == 1' | semgrep -l python -e '$X == $X' -
        shell: wsl-bash {0}
name: build-test-manylinux-x86
on:
  workflow_call: null
  workflow_dispatch: null
